name: "bacnet_npdu_version"
description: "BACnet/IP confirmed by both the BVLCI type byte 0x81 at offset 0 and the NPDU version byte 0x01 at offset 4. All BACnet/IP frames carry these two fixed bytes, and matching both reduces false positives compared to matching the BVLCI type alone. Commonly seen in HVAC controllers, building management systems, and access control panels."
protocol: bacnet
filters:
  - field: udp.dst_port
    value: 47808
  - field: payload
    pattern: "\\x81"
    offset: 0
  - field: payload
    pattern: "\\x01"
    offset: 4
confidence: 4
device_type: building_controller
payloads: []
